name: wordpress

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:5.7
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: wordpress_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      # Checkout source
      - uses: actions/checkout@v3

      # Setup PHP
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer, phpunit, phpcs
          coverage: none

      # Install dependencies
      - name: Install dependencies (if composer.json exists)
        run: |
          if [ -f "wp-content/composer.json" ]; then
            cd wp-content
            composer install --prefer-dist --no-progress --no-suggest
          else
            echo "No composer.json"
          fi

      # PHP Syntax Check
      - name: PHP Syntax Check
        run: find wp-content -name "*.php" -print0 | xargs -0 -n1 php -l

      # WordPress Coding Standards
      - name: WordPress Coding Standards
        run: phpcs --standard=WordPress wp-content || true
